name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install libusb (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev

      - name: build
        run: cargo build --release

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: force-fastboot-${{ runner.os }}
          path: |
            target/release/force-fastboot
            target/release/force-fastboot.exe
          compression-level: 0
